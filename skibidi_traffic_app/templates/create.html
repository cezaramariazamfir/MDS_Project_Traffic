{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skibidi Traffic - Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />
    <link rel="stylesheet" href="{% static 'css/signup.css' %}" />
    <style>
        nav {
            position: relative;
            z-index: 10;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f9fc;
            overflow: hidden;
        }

        .container-signup-page {
            max-height: 100vh;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        form {
            max-width: 650px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-name {
            font-size: 22px;
            font-weight: bold;
            margin: 25px 0 15px;
            text-align: center;
        }

        .camp {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .camp label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .camp input[type="number"],
        .camp input[type="text"],
        .camp select {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        .camp input:focus,
        .camp select:focus {
            border-color: #1f8ef1;
        }

        button {
            padding: 10px 18px;
            background-color: #1f8ef1;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0d6efd;
        }

        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        button.delete-btn {
            background-color: #dc3545 !important;
            margin-left: 10px;
        }

        button.delete-btn:hover {
            background-color: #c82333 !important;
        }
    </style>
</head>
<body>

    <div class="container-signup-page">
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="form-name">
                Introduceți lungimea drumurilor din intersectie<br />
            </div>

            <div class="camp">
                <label for="north">Nord</label>
                <input type="number" id="north" name="length_north" placeholder="Lungime drum Nord (m)" required/>
            </div>

            <div class="camp">
                <label for="east">Est</label>
                <input type="number" id="east" name="length_east" placeholder="Lungime drum Est (m)" required/>
            </div>

            <div class="camp">
                <label for="south">Sud</label>
                <input type="number" id="south" name="length_south" placeholder="Lungime drum Sud (m)" required/>
            </div>

            <div class="camp">
                <label for="west">Vest</label>
                <input type="number" id="west" name="length_west" placeholder="Lungime drum Vest (m)" required/>
            </div>

            <div class="form-name">Configurează benzile pentru fiecare drum:</div>

            <div class="camp">
                <label for="global_width">Lățimea unei benzi</label>
                <input type="number" id="global_width" name="road_width" placeholder="ex: 12" required/>
            </div>

            <div class="camp">
                <label>Nord</label>
                <div id="north-lanes"></div>
                <button type="button" onclick="addLane('north')">Adaugă bandă</button>
            </div>

            <div class="camp">
                <label>Est</label>
                <div id="east-lanes"></div>
                <button type="button" onclick="addLane('east')">Adaugă bandă</button>
            </div>

            <div class="camp">
                <label>Sud</label>
                <div id="south-lanes"></div>
                <button type="button" onclick="addLane('south')">Adaugă bandă</button>
            </div>

            <div class="camp">
                <label>Vest</label>
                <div id="west-lanes"></div>
                <button type="button" onclick="addLane('west')">Adaugă bandă</button>
            </div>

            <div class="button-container">
                <button id="submitBtn" type="button">Trimite</button>
            </div>
        </form>
    </div>

<script type="module" src="{% static 'js/form-handler.js' %}"></script>





</body>
</html>
